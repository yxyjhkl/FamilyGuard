apply plugin: "com.android.application"
apply plugin: "org.jetbrains.kotlin.android"
apply plugin: "com.facebook.react"

def enableProguardInReleaseBuilds = false
def jscFlavor = 'org.webkit:android-jsc:+'

android {
    ndkVersion rootProject.ext.ndkVersion
    buildToolsVersion rootProject.ext.buildToolsVersion
    compileSdk rootProject.ext.compileSdkVersion

    namespace "com.familyguard"

    defaultConfig {
        applicationId "com.familyguard"
        minSdkVersion rootProject.ext.minSdkVersion
        targetSdkVersion rootProject.ext.targetSdkVersion
        versionCode 1
        versionName "1.0"
    }

    signingConfigs {
        debug {
            storeFile file('debug.keystore')
            storePassword 'android'
            keyAlias 'androiddebugkey'
            keyPassword 'android'
        }
        release {
            // ============================================================
            // 签名配置说明：
            // 1. 首次使用：运行 `keytool -genkey -v -keystore release.keystore
            //              -alias <your-alias> -keyalg RSA -keysize 2048 -validity 10000`
            // 2. 将生成的 release.keystore 放到 android/app/ 目录
            // 3. 取消下面 signingConfig 的注释并填入您的信息
            // ============================================================
            // signingConfig signingConfigs.release
        }
    }

    buildTypes {
        debug {
            signingConfig signingConfigs.debug
            applicationIdSuffix ".debug"
            debuggable true
        }
        release {
            signingConfig signingConfigs.debug  // 临时用 debug 签名，正式发布请改用 release
            minifyEnabled enableProguardInReleaseBuilds
            proguardFiles getDefaultProguardFile("proguard-android.txt"), "proguard-rules.pro"
        }
    }

    packagingOptions {
        jniLibs {
            useLegacyPackaging true
        }
    }
}

dependencies {
    // The version of react-native is set by the React Native Gradle Plugin
    implementation("com.facebook.react:react-android")
    
    // react-native-screens
    implementation(project(":react-native-screens"))
    
    // react-native-safe-area-context
    implementation(project(":react-native-safe-area-context"))

    // react-native-view-shot
    implementation(project(":react-native-view-shot"))

    // react-native-share
    implementation(project(":react-native-share"))

    // react-native-camera-roll
    implementation(project(":react-native-camera-roll_camera-roll"))

    // react-native-svg
    implementation(project(":react-native-svg"))

    // react-native-async-storage
    implementation(project(":react-native-async-storage_async-storage"))

    if (hermesEnabled.toBoolean()) {
        implementation("com.facebook.react:hermes-android")
    } else {
        implementation jscFlavor
    }
}
