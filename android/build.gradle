buildscript {
    ext {
        buildToolsVersion = "35.0.0"
        minSdkVersion = 24
        compileSdkVersion = 35
        targetSdkVersion = 35
        kotlinVersion = "1.9.24"
        namespace = "com.familyguard"
        ndkVersion = "25.1.8937393"
    }
}

plugins {
    id("com.facebook.react.rootproject")
}

allprojects {
    repositories {
        maven { url 'https://maven.aliyun.com/repository/google' }
        maven { url 'https://maven.aliyun.com/repository/central' }
        maven { url "$rootDir/../node_modules/react-native/android" }
        maven { url "$rootDir/../node_modules/jsc-android/dist" }
        maven { url "$rootDir/../node_modules/react-native-share/jni" }
        maven { url "$rootDir/../node_modules/react-native-view-shot/jni" }
        maven { url "$rootDir/../node_modules/react-native-camera-roll/camera-roll/jni" }
        maven { url "https://www.jitpack.io" }
        google()
        mavenCentral()
    }
}
